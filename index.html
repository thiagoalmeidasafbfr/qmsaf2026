                        const reg = formData.registration?.trim();
                        if (reg) {
                            const duplicate = globalData.employees.some(emp => emp.registration === reg && emp.id !== itemToEdit?.id);
                            if (duplicate) {
                                showNotification('Já existe um funcionário com esta matrícula.', 'error');
                                return Promise.reject(new Error('duplicate registration'));
                            }
                        }
                    }

                    if (itemToEdit) {
                        await onUpdate(itemToEdit.id, formData);
                    } else {
                        await onAdd(formData);
                    }
                };

                openModal(modalTitle,
                    `<form id="item-form" class="space-y-1">${formHtml.replace(/class="mb-4"(?![\s\S]*class="mb-4")/g, '')}</form>`,
                    asyncOperation,
                    itemToEdit ? 'Salvar Alterações' : 'Adicionar'
                );
            };

            document.getElementById('btn-add-new-item').addEventListener('click', () => openItemModal());
            document.getElementById('btn-back-admin-dash').addEventListener('click', () => { currentView = 'adminDashboard'; renderApp(); });
            document.querySelectorAll('.btn-edit-item').forEach(btn => btn.addEventListener('click', (e) => {
                const itemId = e.currentTarget.dataset.id;
                const item = items.find(i => i.id === itemId);
                if (item) openItemModal(item);
            }));
            document.querySelectorAll('.btn-delete-item').forEach(btn => btn.addEventListener('click', (e) => {
                const itemId = e.currentTarget.dataset.id;
                deleteItemFromFirestore(collectionKey, itemId);
            }));

            if (collectionKey === 'employees') {
                const container = document.getElementById('emp-filters-container');
                if (container) {
                    document.getElementById('emp-btn-apply-filters').addEventListener('click', () => {
                        container.querySelectorAll('.filter-input').forEach(inp => {
                            const key = employeeFilterIdToStateKey[inp.id];
                            if (key) employeeFilterState[key] = inp.value;
                        });
                        renderApp();
                    });
                    document.getElementById('emp-btn-clear-filters').addEventListener('click', () => {
                        employeeFilterState = { searchTerm: '', sector: '' };
                        renderApp();
                    });
                }
            }
        }

        // Renderiza a página para criar/editar perfis de usuário
        function renderAdminCreateUserProfilePage(userToEdit = null) {
            const isCreating = !userToEdit;
            const cdn = collectionDisplayName('users_profile');
            const sectorsOptionsHtml = globalData.sectors.map(s => `<option value="${s.name}" ${userToEdit?.sector === s.name ? 'selected' : ''}>${s.name}</option>`).join('');
            const inp = `w-full px-3.5 py-2.5 bg-white border border-slate-200 rounded-lg text-slate-900 placeholder-slate-400 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all`;
            const inputBaseClass = inp;
            const checkboxClass = "h-4 w-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500";
            const lbl = `block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide`;

            const pageTitle = isCreating ? "Novo Usuário" : `Editar: ${userToEdit.name}`;

            appContent.innerHTML = `
                <div class="animate-fadeIn max-w-xl mx-auto">
                    <div class="exec-card p-6 sm:p-8">
                        <div class="flex justify-between items-center mb-6">
                            <div>
                                <p class="text-xs font-semibold text-slate-500 uppercase tracking-widest">Administração</p>
                                <h2 class="text-xl font-bold text-slate-900 mt-0.5">${pageTitle}</h2>
                            </div>
                            <button id="btn-back-manage-users" class="px-3.5 py-2 text-xs font-semibold bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 rounded-lg transition-colors">← Voltar</button>
                        </div>
                        <form id="user-profile-form" class="space-y-4">
                            ${isCreating ? '<input type="hidden" id="userProfileUid">' : `<div><label class="${lbl}">UID (Firebase Auth)</label><input type="text" id="userProfileUid" value="${userToEdit?.id || ''}" class="${inp} bg-slate-50 text-slate-500 cursor-not-allowed" readonly></div>`}
                            <div><label for="userProfileName" class="${lbl}">Nome Completo</label>
                                 <input type="text" id="userProfileName" value="${userToEdit?.name || ''}" class="${inp}" required placeholder="Nome completo"></div>
                            <div><label for="userProfileEmail" class="${lbl}">Email</label>
                                 <input type="email" id="userProfileEmail" value="${userToEdit?.email || ''}" class="${inp}" required placeholder="email@example.com"></div>
                            ${isCreating ? `
                            <div class="grid grid-cols-2 gap-4">
                                <div><label for="userProfilePassword" class="${lbl}">Senha Inicial</label><input type="password" id="userProfilePassword" class="${inp}" required placeholder="Mínimo 6 caracteres"></div>
                                <div><label for="userProfilePasswordConfirm" class="${lbl}">Confirmar</label><input type="password" id="userProfilePasswordConfirm" class="${inp}" required placeholder="Repita a senha"></div>
                            </div>
                            ` : ''}
                            <div><label for="userProfileSector" class="${lbl}">Setor</label>
                                 <select id="userProfileSector" class="${inp}">
                                     <option value="" ${!(userToEdit?.sector) ? 'selected': ''}>Nenhum</option>
                                     ${sectorsOptionsHtml}
                                 </select></div>
                            <div class="grid grid-cols-2 gap-4 pt-1">
                                <label class="flex items-center gap-2.5 text-sm text-slate-700 cursor-pointer">
                                    <input type="checkbox" id="userProfileIsManager" ${userToEdit?.isManager ? 'checked' : ''} class="${checkboxClass}">
                                    <span class="font-medium">É Gestor?</span>
                                </label>
                                <label class="flex items-center gap-2.5 text-sm text-slate-700 cursor-pointer">
                                    <input type="checkbox" id="userProfileIsAdmin" ${userToEdit?.isAdmin ? 'checked' : ''} class="${checkboxClass}">
                                    <span class="font-medium">É Admin?</span>
                                </label>
                            </div>
                            <div class="flex justify-end gap-2.5 pt-5 border-t border-slate-100">
                                ${!isCreating ? `<button type="button" id="btn-delete-user-profile" class="px-4 py-2.5 text-sm font-semibold bg-white border border-rose-200 hover:bg-rose-50 text-rose-600 rounded-lg transition-colors">Excluir</button>` : ''}
                                <button type="submit" class="px-5 py-2.5 text-sm font-semibold bg-slate-900 hover:bg-slate-800 text-white rounded-lg transition-colors min-w-[120px] text-center">${isCreating ? 'Criar Usuário' : 'Salvar Alterações'}</button>
                            </div>
                        </form>
                    </div>
                </div>`;

            document.getElementById('btn-back-manage-users').onclick = () => { currentView = 'adminManageUsers'; renderApp(); };
            document.getElementById('user-profile-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const submitButton = e.target.querySelector('button[type="submit"]');
                const originalButtonText = submitButton.innerHTML;
                submitButton.disabled = true;
                submitButton.innerHTML = `<span class="flex items-center justify-center"><span class="loader_small_blue mr-2"></span>Processando...</span>`;

                let uid = document.getElementById('userProfileUid').value.trim();
                const email = document.getElementById('userProfileEmail').value.trim();

                if (isCreating) {
                    const pwd = document.getElementById('userProfilePassword').value;
                    const pwdConfirm = document.getElementById('userProfilePasswordConfirm').value;
                    if (!pwd || pwd.length < 6) {
                        showNotification('A senha deve ter pelo menos 6 caracteres.', 'error');
                        submitButton.disabled = false;
                        submitButton.innerHTML = originalButtonText;
                        return;
                    }
                    if (pwd !== pwdConfirm) {
                        showNotification('As senhas não conferem.', 'error');
                        submitButton.disabled = false;
                        submitButton.innerHTML = originalButtonText;
                        return;
                    }
                    try {
                        uid = await createAuthUser(email, pwd);
                        document.getElementById('userProfileUid').value = uid;
                    } catch (error) {
                        console.error('Erro ao criar usuário Auth:', error);
                        const createUserErrors = {
                            'auth/email-already-in-use': 'Este email já está em uso por outra conta.',
                            'auth/invalid-email': 'Email inválido.',
                            'auth/weak-password': 'Senha muito fraca. Use pelo menos 6 caracteres.',
                            'auth/operation-not-allowed': 'Operação não permitida. Contate o suporte.'
                        };
                        showNotification(createUserErrors[error.code] || 'Erro ao criar usuário: ' + error.message, 'error');
                        submitButton.disabled = false;
                        submitButton.innerHTML = originalButtonText;
                        return;
                    }
                } else {
                    if (!uid) {
                        showNotification("O UID do Usuário é obrigatório.", "error");
                        submitButton.disabled = false;
                        submitButton.innerHTML = originalButtonText;
                        return;
                    }
                }

                const isManagerChecked = document.getElementById('userProfileIsManager').checked;
                const sectorValue = document.getElementById('userProfileSector').value;
                if (isManagerChecked && (!sectorValue || sectorValue.trim() === '')) {
                    showNotification('Um gestor deve ter um setor definido.', 'error');
                    submitButton.disabled = false;
                    submitButton.innerHTML = originalButtonText;
                    return;
                }

                const profileData = {
                    name: document.getElementById('userProfileName').value,
                    email: email,
                    sector: sectorValue,
                    isManager: isManagerChecked,
                    isAdmin: document.getElementById('userProfileIsAdmin').checked,
                    uid: uid
                };

                try {
                    const userDocRef = doc(getCollectionRef('users_profile', false), uid);
                    // setDoc com { merge: true } para atualizar ou criar se não existir
                    await setDoc(userDocRef, profileData, { merge: !isCreating });
                    showNotification(`Perfil de usuário ${isCreating ? 'criado' : 'atualizado'} com sucesso!`, "success");
                    currentView = 'adminManageUsers';
                    renderApp();
                } catch (error) {
                    showNotification(`Erro ao ${isCreating ? 'criar' : 'atualizar'} perfil. Detalhes no console.`, "error");
                    console.error(`Erro ao salvar perfil de usuário ${uid}:`, error);
                    submitButton.disabled = false;
                    submitButton.innerHTML = originalButtonText;
                }
            });
            if (!isCreating) {
                document.getElementById('btn-delete-user-profile').addEventListener('click', () => {
                    const uid = document.getElementById('userProfileUid').value.trim();
                    if (uid) deleteUserCompletely(uid);
                });
            }
        }

                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>

            appContent.innerHTML = `

            document.querySelectorAll('.btn-edit-user').forEach(btn => btn.addEventListener('click', (e) => {

        // --- Funções de Exportação ---
        // Exporta dados para CSV
        function exportToCSV(records) {
            if (!records || records.length === 0) {
                showNotification("Nenhum dado para exportar.", "info"); return;
            }
            const headers = ["Data Criação", "Evento", "Data Evento", "Horário", "Cat. Jogo", "QM", "Valor QM", "Funcionário", "Setor", "Gestor Lançador", "Observações"];
            let csvContent = headers.join(",") + "\\n";

            records.forEach(record => {
                const row = [
                    record.createdAt?.toDate?.().toLocaleString('pt-BR', {dateStyle:'short', timeStyle:'short'}) || 'N/A',
                    `"${(record.eventName || 'N/A').replace(/"/g, '""')}"`,
                    record.eventDate ? new Date(record.eventDate + 'T00:00:00').toLocaleDateString('pt-BR') : 'N/A',
                    record.gameTime || '-',
                    `"${(record.gameCategory || record.categoryName || 'N/A').replace(/"/g, '""')}"`,
                    record.qmClassification || '-',
                    record.qmValue ? `R$ ${record.qmValue}` : '-',
                    `"${(record.employeeName || 'N/A').replace(/"/g, '""')}"`,
                    `"${(record.sector || 'N/A').replace(/"/g, '""')}"`,
                    `"${(record.managerName || 'N/A').replace(/"/g, '""')}"`,
                    `"${(record.notes || '-').replace(/"/g, '""')}"`
                ];
                csvContent += row.join(",") + "\\n";
            });

            const encodedUri = encodeURI("data:text/csv;charset=utf-8," + csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "historico_registros.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showNotification("CSV exportado com sucesso!", "success");
        }

        // Exporta dados para XLSX
        function exportToXLSX(records) {
            if (typeof XLSX === 'undefined') {
                showNotification("Erro: Biblioteca de exportação XLSX não carregada.", "error");
                console.error("XLSX library (SheetJS) not found. Make more details in console");
                return;
            }
            if (!records || records.length === 0) {
                showNotification("Nenhum dado para exportar.", "info"); return;
            }

            const dataForSheet = records.map(record => ({
                "Data Criação": record.createdAt?.toDate?.().toLocaleString('pt-BR', {dateStyle:'short', timeStyle:'short'}) || 'N/A',
                "Evento": record.eventName || 'N/A',
                "Data Evento": record.eventDate ? new Date(record.eventDate + 'T00:00:00').toLocaleDateString('pt-BR') : 'N/A',
                "Horário": record.gameTime || '-',
                "Cat. Jogo": record.gameCategory || record.categoryName || 'N/A',
                "QM": record.qmClassification || '-',
                "Valor QM": record.qmValue ? `R$ ${record.qmValue}` : '-',
                "Funcionário": record.employeeName || 'N/A',
                "Setor": record.sector || 'N/A',
                "Gestor Lançador": record.managerName || 'N/A',
                "Observações": record.notes || '-'
            }));

            const worksheet = XLSX.utils.json_to_sheet(dataForSheet);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Histórico");
            XLSX.writeFile(workbook, "historico_registros.xlsx");
            showNotification("XLSX exportado com sucesso!", "success");
        }


        // Garante que o login inicial seja tentado ao carregar a página
        document.addEventListener('DOMContentLoaded', () => {
            performInitialSignIn();
        });

    </script>
