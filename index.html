        // Lida com o upload do arquivo e processa os dados
        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) {
                showNotification("Nenhum arquivo selecionado.", "info");
                return;
            }

            const importStatusDiv = document.getElementById('import-status');
            const importSummaryP = document.getElementById('import-summary');
            const importErrorsDiv = document.getElementById('import-errors');
            showElement(importStatusDiv);
            importSummaryP.innerHTML = 'Processando... <span class="loader_small_blue ml-2 inline-block align-middle"></span>';
            importErrorsDiv.innerHTML = '';
            importStatusDiv.classList.remove('bg-red-50', 'bg-green-50'); // Limpa estados anteriores

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[sheetName];

                    // Lê cabeçalhos e normaliza nomes legados
                    const allRows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                    const rawHeaders = allRows[0].map(h => String(h).trim());
                    const headerNormMap = { 'Horário do Jogo': 'Horário do Evento' };
                    const headers = rawHeaders.map(h => headerNormMap[h] || h);

                    // Cabeçalhos obrigatórios mínimos (Tipo de Evento é opcional para backward compat)
                    const requiredHeaders = ["Nome do Evento", "Data do Evento", "Horário do Evento", "Tipo QM", "Funcionário"];
                    // Aceita também o cabeçalho legado "Horário do Jogo" (já normalizado acima)
                    const missingHeaders = requiredHeaders.filter(h => !headers.includes(h));

                    if (missingHeaders.length > 0) {
                        showNotification(`Cabeçalhos ausentes: ${missingHeaders.join(', ')}. Verifique sua planilha.`, "error");
                        importSummaryP.textContent = `Erro: Cabeçalhos ausentes: ${missingHeaders.join(', ')}.`;
                        importStatusDiv.classList.add('bg-red-50');
                        return;
                    }

                    const recordsRaw = XLSX.utils.sheet_to_json(worksheet, { header: 1, range: 1, raw: false });

                    const recordsToProcess = recordsRaw.map(row => {
                        const newRecord = {};
                        headers.forEach((header, index) => {
                            newRecord[header.trim()] = (row[index] !== undefined && row[index] !== null) ? String(row[index]).trim() : '';
                        });
                        return newRecord;
                    }).filter(record => Object.values(record).some(value => value !== undefined && value !== ''));


                    let recordsToAdd = [];
                    let duplicateRecords = [];
                    let errorsBeforeImport = [];
                    const importManagerSectors = getUserSectors(userProfile);

                    // Step 1: Pre-validação e identificação de duplicatas
                    for (const record of recordsToProcess) {
                        const rowNum = recordsToProcess.indexOf(record) + 2;
                        try {
                            // Tipo de Evento: default "Jogo" para planilhas antigas sem essa coluna
                            const eventTypeRaw = (record["Tipo de Evento"] || 'Jogo').trim();
                            const isJogo = eventTypeRaw.toLowerCase() === 'jogo';
                            const isOutros = eventTypeRaw.toLowerCase() === 'outros';
                            if (!isJogo && !isOutros) {
                                throw new Error(`Tipo de Evento "${eventTypeRaw}" inválido. Use "Jogo" ou "Outros".`);
                            }
                            const eventType = isJogo ? 'jogo' : 'outros';

                            const eventName = record["Nome do Evento"];
                            const eventDateRaw = record["Data do Evento"];
                            const gameTimeRaw = record["Horário do Evento"];
                            const gameCategory = (record["Categoria do Jogo"] || '').trim();
                            const employeeName = record["Funcionário"];
                            const notes = record["Observações"] || '';

                            if (!eventName || !eventDateRaw || !gameTimeRaw || !employeeName) {
                                throw new Error("Campos obrigatórios (Nome do Evento, Data do Evento, Horário do Evento, Funcionário) não podem estar vazios.");
                            }

                            // Validações condicionais por tipo
                            if (isJogo) {
                                if (!gameCategory) throw new Error("Para eventos do tipo 'Jogo', a Categoria do Jogo é obrigatória.");
                                if (!GAME_CATEGORIES.includes(gameCategory)) {
                                    throw new Error(`Categoria "${gameCategory}" inválida. Use uma das categorias disponíveis na aba Listas.`);
                                }
                            }
                            if (isOutros && !notes.trim()) {
                                throw new Error("Para eventos do tipo 'Outros', o campo Observações é obrigatório.");
                            }

                            // Valida horário
                            if (!GAME_TIMES.includes(gameTimeRaw.trim())) {
                                throw new Error(`Horário "${gameTimeRaw}" inválido. Use HH:MM em intervalos de 15 minutos (ex: 18:00, 20:30).`);
                            }
                            const gameTime = gameTimeRaw.trim();

                            // Validação e formatação da data
                            let eventDate;
                            if (typeof eventDateRaw === 'number') {
                                const dateObj = XLSX.SSF.parse_date_code(eventDateRaw);
                                eventDate = `${dateObj.y}-${String(dateObj.m).padStart(2, '0')}-${String(dateObj.d).padStart(2, '0')}`;
                            } else if (eventDateRaw.match(/^\d{4}-\d{2}-\d{2}$/)) {
                                eventDate = eventDateRaw;
                            } else if (eventDateRaw.match(/^\d{2}\/\d{2}\/\d{4}$/)) { // DD/MM/YYYY
                                const parts = eventDateRaw.split('/');
                                eventDate = `${parts[2]}-${parts[1]}-${parts[0]}`;
                            } else if (eventDateRaw.match(/^\d{1,2}\/\d{1,2}\/\d{4}$/)) { // M/D/YYYY
                                const parts = eventDateRaw.split('/');
                                eventDate = `${parts[2]}-${String(parts[1]).padStart(2, '0')}-${String(parts[0]).padStart(2, '0')}`;
                            } else if (eventDateRaw.match(/^\d{1,2}\/\d{1,2}\/\d{2}$/)) { // M/D/YY
                                const parts = eventDateRaw.split('/');
                                const year = parseInt(parts[2], 10) + 2000;
                                eventDate = `${year}-${String(parts[1]).padStart(2, '0')}-${String(parts[0]).padStart(2, '0')}`;
                            } else {
                                throw new Error(`Formato de data inválido: "${eventDateRaw}". Use DD/MM/AAAA ou AAAA-MM-DD.`);
                            }

                            let employeeId; let finalEmployeeName; let foundEmployee = null;
                            if (employeeName.toLowerCase() === 'outros') {
                                if (!notes.trim()) {
                                    throw new Error("Funcionário 'Outros' requer o nome completo no campo Observações.");
                                }
                                employeeId = 'OUTROS';
                                finalEmployeeName = notes.trim();
                            } else {
                                const employeesInSector = userProfile.isAdmin
                                    ? globalData.employees
                                    : globalData.employees.filter(emp => getEmployeeSectors(emp).some(s => importManagerSectors.includes(s)));
                                foundEmployee = employeesInSector.find(emp => emp.name?.toLowerCase() === employeeName.toLowerCase());
                                if (!foundEmployee) {
                                    const sectorDesc = userProfile.isAdmin ? '' : ` (setores: ${importManagerSectors.join(', ')})`;
                                    throw new Error(`Funcionário "${employeeName}" não encontrado${sectorDesc}.`);
                                }
                                employeeId = foundEmployee.id;
                                finalEmployeeName = foundEmployee.name;
                            }

                            const qmTypeRaw = (record["Tipo QM"] || '').trim().toUpperCase();
                            if (qmTypeRaw !== 'A' && qmTypeRaw !== 'B') {
                                throw new Error(`Tipo QM "${qmTypeRaw || '(vazio)'}" inválido. Use apenas "A" ou "B".`);
                            }
                            const qmType = qmTypeRaw; // 'A' ou 'B'
                            const qmResult = computeQMClassification(qmType, eventDate, gameTime);

                            const dataToSave = {
                                eventName,
                                eventDate,
                                gameTime,
                                eventType,
                                gameCategory,
                                qmClassification: qmResult.classification,
                                qmValue: qmResult.value,
                                employeeId,
                                employeeName: finalEmployeeName,
                                notes,
                            };

                            // Check for duplicates in existing records
                            const isDuplicate = globalData.records.some(existingRecord =>
                                existingRecord.eventDate === dataToSave.eventDate &&
                                existingRecord.employeeId === dataToSave.employeeId
                            );

                            if (isDuplicate) {
                                duplicateRecords.push({ rowNum, data: dataToSave });
                            } else {
                                recordsToAdd.push({ rowNum, data: dataToSave });
                            }

                        } catch (validationError) {
                            errorsBeforeImport.push(`Linha ${rowNum}: ${validationError.message}`);
                            console.error(`Erro de validação na linha ${rowNum}:`, validationError);
                        }
                    }

                    if (errorsBeforeImport.length > 0) {
                        importSummaryP.textContent = `Erros de validação encontrados. Nenhum registro importado.`;
                        importErrorsDiv.innerHTML = errorsBeforeImport.map(err => `<p class="text-xs font-mono break-words">${err}</p>`).join('');
                        importStatusDiv.classList.add('bg-red-50');
                        showNotification("Erro na validação da planilha. Verifique os detalhes.", "error", 8000);
                        return; // Stop if there are validation errors
                    }

                    let proceedWithDuplicates = true;
                    if (duplicateRecords.length > 0) {
                        const duplicateListHtml = duplicateRecords.map(d =>
                            `<p class="text-xs font-mono">Linha ${d.rowNum}: Evento "${d.data.eventName}" (${new Date(d.data.eventDate + 'T00:00:00').toLocaleDateString('pt-BR')}), Funcionário: "${d.data.employeeName}"</p>`
                        ).join('');

                        await new Promise(resolve => {
                            openModal(
                                "Registros Duplicados Encontrados",
                                `
                                <p class="mb-3">A planilha contém ${duplicateRecords.length} registro(s) que parecem ser duplicados, com a mesma data do evento e funcionário já existentes no sistema:</p>
                                <div class="max-h-32 overflow-y-auto p-2 bg-gray-100 rounded-md border border-gray-200 mb-4">${duplicateListHtml}</div>
                                <p>Deseja prosseguir com a inclusão desses registros duplicados?</p>
                                `,
                                () => { proceedWithDuplicates = true; resolve(); },
                                'Sim, Prosseguir',
                                () => { proceedWithDuplicates = false; resolve(); },
                                'Não, Ignorar Duplicados'
                            );
                        });
                    }

                    let successfulImports = 0;
                    let failedImports = 0;
                    let importErrorMessages = [];

                    // Step 2: Perform the import based on user's decision
                    for (const recordInfo of recordsToAdd) {
                        const result = await addRecordToFirestore(recordInfo.data);
                        if (result.success) {
                            successfulImports++;
                        } else {
                            failedImports++;
                            importErrorMessages.push(`Linha ${recordInfo.rowNum}: ${result.error || 'Erro desconhecido ao adicionar registro.'}`);
                        }
                    }

                    if (proceedWithDuplicates) {
                        for (const recordInfo of duplicateRecords) {
                            const result = await addRecordToFirestore(recordInfo.data);
                            if (result.success) {
                                successfulImports++;
                            } else {
                                failedImports++;
                                importErrorMessages.push(`Linha ${recordInfo.rowNum} (duplicado): ${result.error || 'Erro desconhecido ao adicionar registro.'}`);
                            }
                        }
                    } else {
                        // If not proceeding with duplicates, add them to failed imports for reporting
                        failedImports += duplicateRecords.length;
                        duplicateRecords.forEach(d => {
                            importErrorMessages.push(`Linha ${d.rowNum}: Registro duplicado ignorado por escolha do usuário.`);
                        });
                    }

                    // Final Status Update
                    if (successfulImports > 0) {
                        showNotification(`Importação concluída. ${successfulImports} registro(s) adicionado(s) com sucesso!`, "success");
                        importStatusDiv.classList.add('bg-green-50');
                    }
                    if (failedImports > 0) {
                        showNotification(`Atenção: ${failedImports} registro(s) falharam ou foram ignorados na importação.`, "error");
                        importStatusDiv.classList.add('bg-red-50');
                        importErrorsDiv.innerHTML = importErrorMessages.map(err => `<p class="text-xs font-mono break-words">${err}</p>`).join('');
                    }
                    importSummaryP.textContent = `Importação concluída: ${successfulImports} sucesso(s), ${failedImports} falha(s)/ignorados.`;

                    // Modal de confirmação com resumo da importação
                    let resultHtml = `<p>${successfulImports} registro(s) adicionado(s) com sucesso.</p>`;
                    if (failedImports > 0) {
                        const errorsHtml = importErrorMessages
                            .map(err => `<p class="font-mono break-words">${err}</p>`)
                            .join('');
                        resultHtml += `
                            <p class="mt-4">${failedImports} registro(s) apresentaram problemas:</p>
                            <div class="max-h-32 overflow-y-auto p-2 bg-gray-100 rounded-md border border-gray-200 mt-2 space-y-1 text-sm text-red-700">
                                ${errorsHtml}
                            </div>
                        `;
                    }
                    openModal('Importação Concluída', resultHtml, null, '', () => {}, 'Fechar');

                } catch (generalError) {
                    showNotification("Erro ao processar o arquivo. Verifique o formato.", "error");
                    importSummaryP.textContent = `Erro geral: ${generalError.message}.`;
                    importStatusDiv.classList.add('bg-red-50');
                    console.error("Erro geral no processamento do arquivo:", generalError);
                } finally {
                    event.target.value = ''; // Limpa o input file para permitir re-upload do mesmo arquivo
                }
            };

            if (file.name.endsWith('.csv')) {
                reader.readAsText(file); // For CSV, read as text
            } else {
                reader.readAsArrayBuffer(file); // For XLSX/XLS, read as array buffer
            }
        }


        // Renderiza o histórico de registros
        function renderRecordHistory() {

            // Generates the table HTML based on the provided data
            const generateTableHtml = (data) => {
                currentFilteredRecordsForExport = [...data];
                const qmBadge = (cls) => {

                        </td>
                        <td class="text-xs text-slate-600 whitespace-nowrap" style="padding:10px 16px;max-width:140px;overflow:hidden;text-overflow:ellipsis">${record.gameCategory || record.categoryName || 'N/A'}</td>

                        </td>

                        <td class="text-xs text-slate-600 whitespace-nowrap" style="padding:10px 16px">${record.sector || '-'}</td>
                        <td class="text-xs text-slate-600 whitespace-nowrap" style="padding:10px 16px">${record.managerName || '-'}</td>
                        <td class="text-xs text-slate-500" style="padding:10px 16px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${record.notes || ''}">${record.notes || '—'}</td>
                        ${(userProfile.isManager && getUserSectors(userProfile).includes(record.sector) && !userProfile.isAdmin && record.managerId === currentUser.uid) || userProfile.isAdmin ?
                            `<td class="text-center" style="padding:10px 16px">
                                <button class="btn-delete-record text-slate-400 hover:text-rose-600 p-1.5 hover:bg-rose-50 rounded-lg transition-colors" data-id="${record.id}" title="Excluir">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                                </button>
                            </td>` : '<td style="padding:10px 16px"></td>'
                        }
                    </tr>
                `).join('');

                return data.length === 0 ?
                    `<div class="text-center py-14">
                        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5" class="mx-auto mb-3"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <p class="text-slate-500 text-sm font-medium">Nenhum registro encontrado</p>
                        <p class="text-slate-400 text-xs mt-1">Ajuste os filtros para ver resultados</p>
                    </div>` :
                    `<div class="tbl-scroll-wrap border border-slate-100 rounded-xl">
                        <table class="tbl min-w-full">
                            <thead>
                                <tr>
                                    <th style="padding-left:16px">
                                        <div class="flex items-center gap-2">
                                            <input type="checkbox" id="select-all-records-checkbox" class="h-3.5 w-3.5 text-blue-600 border-slate-300 rounded focus:ring-blue-500 cursor-pointer">
                                            <span>Criado em</span>
                                        </div>
                                    </th>
                                    <th>Evento</th>
                                    <th>Categoria</th>
                                    <th class="text-center">QM</th>
                                    <th>Funcionário</th>
                                    <th>Setor</th>
                                    <th>Gestor</th>
                                    <th>Obs.</th>
                                    ${(userProfile.isAdmin || userProfile.isManager) ? '<th class="text-center">Ação</th>' : ''}

                            <tbody>${tableRows}</tbody>

                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                            Excluir Selecionados
                        </button>
                    </div>`;
            };

            // Helper to get records based on the current filters
            const getFilteredRecords = () => {

                const term = filterState.searchTerm.trim().toLowerCase();

                    data = data.filter(r =>
                        (r.eventName && r.eventName.toLowerCase().includes(term)) ||
                        (r.employeeName && r.employeeName.toLowerCase().includes(term)) ||
                        (r.notes && r.notes.toLowerCase().includes(term))

                    const t = filterState.eventName.trim().toLowerCase();
                    data = data.filter(r => r.eventName?.toLowerCase().includes(t));
                }
                if (filterState.employeeId) {
                    data = data.filter(r => r.employeeId === filterState.employeeId);
                }
                if (filterState.gameCategory) {
                    data = data.filter(r => r.gameCategory === filterState.gameCategory);
                }
                if (filterState.notes.trim()) {
                    const n = filterState.notes.trim().toLowerCase();
                    data = data.filter(r => r.notes?.toLowerCase().includes(n));
                }
                if (userProfile.isAdmin && filterState.sector) {
                    data = data.filter(r => r.sector === filterState.sector);
                }
                if (userProfile.isAdmin && filterState.managerName) {
                    data = data.filter(r => r.managerName === filterState.managerName);
                }
                if (filterState.eventDateStart) {
                    data = data.filter(r => r.eventDate >= filterState.eventDateStart);
                }
                if (filterState.eventDateEnd) {

                }
                if (filterState.creationDateStart) {
                    data = data.filter(r => r.createdAt?.toDate?.() >= new Date(filterState.creationDateStart + 'T00:00:00'));

                if (filterState.creationDateEnd) {
                    const endDate = new Date(filterState.creationDateEnd + 'T23:59:59');
                    data = data.filter(r => r.createdAt?.toDate?.() <= endDate);
                }
                return data;
            };

            applyFilters = () => {

                const container = document.getElementById('record-history-table-container');
                if (container) {
                    container.innerHTML = generateTableHtml(records);
                    document.getElementById('btn-delete-selected-records')?.addEventListener('click', deleteSelectedRecords);
                }
                updateSelectedCountUI();
            };

            const clearFilters = () => {
                filterState = {

                    searchTerm: '',
                    eventName: '',
                    employeeId: '',
                    gameCategory: '',
                    notes: '',
                    sector: '',
                    managerName: '',
                    eventDateStart: '',
                    eventDateEnd: '',
                    creationDateStart: '',
                    creationDateEnd: ''
                };
                document.querySelectorAll('#filters-container .filter-input').forEach(input => input.value = '');
                applyFilters();
            };

            const initialRecordsToDisplay = getFilteredRecords();

            appContent.innerHTML = `
                <div class="animate-fadeIn space-y-5">
                    <div class="exec-card p-5">
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                            <div>
                                <p class="text-xs font-semibold text-slate-500 uppercase tracking-widest">Quadro Móvel</p>
                                <h2 class="text-xl font-bold text-slate-900 mt-0.5">Histórico de Registros</h2>
                                ${userProfile.isManager && !userProfile.isAdmin ? `<p class="text-xs text-slate-500 mt-0.5">Setor: <span class="font-semibold text-slate-700">${userProfile.sector}</span></p>` : ''}
                            </div>

            // Function to update the count of selected records and enable/disable the delete button
            updateSelectedCountUI = () => {
                const count = selectedRecordIds.size;
                const bulkActionsContainer = document.getElementById('bulk-actions-container');
                const selectedRecordsCountSpan = document.getElementById('selected-records-count');
                const deleteSelectedBtn = document.getElementById('btn-delete-selected-records');

                if (bulkActionsContainer && selectedRecordsCountSpan && deleteSelectedBtn) { // Ensure elements exist
                    if (count > 0) {
                        showElement(bulkActionsContainer);
                        selectedRecordsCountSpan.textContent = `${count} registro(s) selecionado(s)`;
                        deleteSelectedBtn.disabled = false;
                    } else {
                        hideElement(bulkActionsContainer);
                        selectedRecordsCountSpan.textContent = '';
                        deleteSelectedBtn.disabled = true;
                    }
                }


                // Update "Select All" checkbox state
                const selectAllCheckbox = document.getElementById('select-all-records-checkbox');
                if (selectAllCheckbox) {
                    const visibleRecordCheckboxes = document.querySelectorAll('.record-checkbox');
                    const allVisibleSelected = Array.from(visibleRecordCheckboxes).every(cb => cb.checked);
                    selectAllCheckbox.checked = allVisibleSelected && visibleRecordCheckboxes.length > 0;
                    selectAllCheckbox.indeterminate = !allVisibleSelected && count > 0;
                }
            };

            // Function to handle the "Select All" checkbox toggle
            const toggleSelectAllCheckboxes = (event) => {
                const isChecked = event.target.checked;
                document.querySelectorAll('.record-checkbox').forEach(checkbox => {
                    checkbox.checked = isChecked;
                    const recordId = checkbox.dataset.id;
                    if (isChecked) {
                        selectedRecordIds.add(recordId);
                    } else {
                        selectedRecordIds.delete(recordId);
                    }
                });
                updateSelectedCountUI();
            };

            // Function to handle individual checkbox changes
            const handleIndividualCheckboxChange = (event) => {
                const recordId = event.target.dataset.id;
                if (event.target.checked) {
                    selectedRecordIds.add(recordId);
                } else {
                    selectedRecordIds.delete(recordId);
                }
                updateSelectedCountUI();
            };

            // Function to delete selected records
            const deleteSelectedRecords = async () => {
                if (selectedRecordIds.size === 0) {
                    showNotification("Nenhum registro selecionado para exclusão.", "info");
                    return;
                }

                const recordsToDeleteDetails = Array.from(selectedRecordIds).map(id => {
                    const record = globalData.records.find(r => r.id === id);
                    return record ? { id: record.id, name: `${record.eventName} (${new Date(record.eventDate + 'T00:00:00').toLocaleDateString('pt-BR')})` } : { id: id, name: `ID: ${id}` };
                });
                const recordsToDeleteListHtml = recordsToDeleteDetails.map(d => `<p class="text-xs font-mono">${d.name}</p>`).join('');

                openModal(
                    `Confirmar Exclusão de Registros`,
                    `<p>Você está prestes a excluir os seguintes ${selectedRecordIds.size} registro(s):</p><div class="max-h-32 overflow-y-auto p-2 bg-gray-100 rounded-md border border-gray-200 mb-4">${recordsToDeleteListHtml}</div><p>Esta ação não pode ser desfeita. Deseja continuar?</p>`,
                    async () => {
                        let successfulDeletions = 0;
                        let failedDeletions = 0;
                        const idsActuallyDeleted = new Set(); // Track successfully deleted IDs

                        // Perform deletions sequentially to await each promise
                        for (const recordDetail of recordsToDeleteDetails) {
                            const result = await _performDirectDelete('records', recordDetail.id);
                            if (result.success) {
                                successfulDeletions++;
                                idsActuallyDeleted.add(recordDetail.id);
                            } else {
                                failedDeletions++;
                                console.error(`Falha ao excluir registro ${recordDetail.id}:`, result.error);
                            }
                        }

                        // Clear the selected IDs from the global set based on which ones were actually deleted
                        // This ensures that if a deletion failed, its checkbox state can be re-evaluated
                        selectedRecordIds.forEach(id => {
                            if (idsActuallyDeleted.has(id)) {
                                selectedRecordIds.delete(id);
                            }
                        });
                        // Alternatively, we could just clear all selectedRecordIds and let renderApp rebuild the set.
                        // selectedRecordIds.clear(); // If you want to clear all selections regardless of success/failure for the bulk operation.

                        showNotification(`Exclusão concluída: ${successfulDeletions} sucesso(s), ${failedDeletions} falha(s).`, successfulDeletions > 0 ? 'success' : (failedDeletions > 0 ? 'error' : 'info'));
                        renderApp(); // Re-render to update the table
                    },
                    'Excluir',
                    () => { /* Cancel action */ },
                    'Cancelar'
                );
            };

            // Event Listeners for Filter Buttons (Delegated to filters-container)
            const filtersContainer = document.getElementById('filters-container');
            if (filtersContainer) {
                document.getElementById('btn-apply-filters').addEventListener('click', applyFilters);
                document.getElementById('btn-clear-filters').addEventListener('click', clearFilters);

                // Add input listeners to update filterState immediately
                filtersContainer.querySelectorAll('.filter-input').forEach(input => {
                    input.addEventListener('input', (event) => {
                        const key = filterIdToStateKey[event.target.id];
                        if (key) {
                            filterState[key] = event.target.value;
                            // For select and date inputs, apply filters immediately on change
                            if (event.target.tagName === 'SELECT' || event.target.type === 'date') {
                                applyFilters();
                            }
                        }
                    });
                });
            } else {
                console.error("Filters container not found!");
            }

            // Delegated event listeners for checkboxes (since rows are dynamically rendered)
            const recordHistoryTableContainer = document.getElementById('record-history-table-container');
            if (recordHistoryTableContainer) {
                recordHistoryTableContainer.addEventListener('change', (event) => {
                    if (event.target.classList.contains('record-checkbox')) {
                        handleIndividualCheckboxChange(event);
                    } else if (event.target.id === 'select-all-records-checkbox') {
                        toggleSelectAllCheckboxes(event);
                    }
                });

                recordHistoryTableContainer.addEventListener('click', (event) => {
                    const deleteBtn = event.target.closest('.btn-delete-record');
                    if (deleteBtn) {
                        const recordId = deleteBtn.dataset.id;
                        confirmAction(
                            `Confirmar Exclusão`,
                            `Tem certeza que deseja excluir este registro? Esta ação não pode ser desfeita.`,
                            async () => {
                                await deleteItemFromFirestore('records', recordId, null, null, true);
                            }
                        );
                    }
                });
            } else {
                console.error("Record history table container not found!");
            }


            document.getElementById('btn-back-dashboard').addEventListener('click', () => {
                currentView = userProfile.isAdmin ? 'adminDashboard' : 'managerDashboard';
                renderApp();
            });

            document.getElementById('btn-delete-selected-records')?.addEventListener('click', deleteSelectedRecords);
            document.getElementById('btn-export-csv').addEventListener('click', () => exportToCSV(currentFilteredRecordsForExport));
            document.getElementById('btn-export-xlsx').addEventListener('click', () => exportToXLSX(currentFilteredRecordsForExport));

            // Initial UI update for selected count
            updateSelectedCountUI();
        }

            const openItemModal = (itemToEdit = null) => {

                fields.forEach(field => {

                    const fieldId = `field-${field.name}`;
                    if (field.type === 'multiselect-sectors') {
                        const currentSectors = getEmployeeSectors(itemToEdit || {});
                        const checkboxesHtml = (field.options || []).map(opt =>
                            `<label class="flex items-center gap-2 text-sm text-slate-700 cursor-pointer p-1 rounded hover:bg-slate-50">

                        ).join('');
                        formHtml += `<div class="mb-4"><label class="${lbl}">${field.label}</label><div class="max-h-40 overflow-y-auto p-2 border border-slate-200 rounded-lg space-y-0.5">${checkboxesHtml || '<p class="text-xs text-slate-400 p-2">Nenhum departamento cadastrado</p>'}</div></div>`;
                    } else if (field.type === 'select') {
                        const optionsHtml = field.options.map(opt => `<option value="${opt.value}" ${value === opt.value ? 'selected' : ''}>${opt.label}</option>`).join('');

                });
                const modalTitle = itemToEdit ? `Editar ${cdn.singular}` : `Adicionar ${cdn.singular}`;

                    const formData = {};
                    const formElement = document.getElementById('item-form');
                    if (formElement && !formElement.checkValidity()) {
                        showNotification("Por favor, preencha todos os campos obrigatórios.", "error");
                        formElement.reportValidity();
                        return Promise.reject(new Error("Formulário inválido"));
                    }

                    fields.forEach(field => {
                        if (field.type === 'multiselect-sectors') {
                            const checked = document.querySelectorAll('.sectors-check:checked');
                            const selectedSectors = Array.from(checked).map(cb => cb.value);
                            formData.sectors = selectedSectors;
                            formData.sector = selectedSectors[0] || '';
                        } else {
                            const inputElement = document.getElementById(`field-${field.name}`);
                            if (inputElement) {
                                formData[field.name] = inputElement.value;
                            }
                        }
                    });

                    if (collectionKey === 'employees') {
                        const reg = formData.registration?.trim();
                        if (reg) {
                            const duplicate = globalData.employees.some(emp => emp.registration === reg && emp.id !== itemToEdit?.id);

                                showNotification('Já existe um funcionário com esta matrícula.', 'error');
                                return Promise.reject(new Error('duplicate registration'));
                            }
                        }
                    }

                    if (itemToEdit) {
                        await onUpdate(itemToEdit.id, formData);
                    } else {
                        await onAdd(formData);
                    }
                };

                openModal(modalTitle,
                    `<form id="item-form" class="space-y-1">${formHtml}</form>`,

            if (hasImportExport) {

                    exportManageableItems(collectionKey, items);
                });
                document.getElementById('btn-download-template-manage').addEventListener('click', () => {
                    downloadManageTemplate(collectionKey);
                });
            }
        }

        // Renderiza a página para criar/editar perfis de usuário
        function renderAdminCreateUserProfilePage(userToEdit = null) {

                    const pwdConfirm = document.getElementById('userProfilePasswordConfirm').value;

                        submitButton.innerHTML = originalButtonText;

                    sectors: selectedSectors,
                    sector: selectedSectors[0] || '',
                    is_manager: isManagerChecked,
                    is_admin: document.getElementById('userProfileIsAdmin').checked,
                    uid: uid
                };

                    const { error } = isCreating

                    console.error(`Erro ao salvar perfil de usuário ${uid}:`, error);
                    submitButton.disabled = false;
                    submitButton.innerHTML = originalButtonText;
                }
            });
            if (!isCreating) {
                document.getElementById('btn-delete-user-profile').addEventListener('click', () => {
                    const uid = document.getElementById('userProfileUid').value.trim();
                    if (uid) deleteUserCompletely(uid);
                });
            }
        }

                                <button id="btn-add-new-user-profile" class="btn-primary" style="font-size:12px;padding:7px 12px">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                                    Novo Usuário
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="exec-card">
                    ${users.length === 0 ?
                        `<div class="text-center py-14">
                            <div class="avatar mx-auto mb-3" style="width:40px;height:40px;background:#f1f5f9">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            </div>
                            <p class="text-slate-500 text-sm font-medium">Nenhum usuário encontrado</p>
                        </div>` :
                        `<div class="overflow-x-auto">
                            <table class="tbl min-w-full">
                                <thead><tr>
                                    <th>Nome</th><th>Email</th><th>Setor</th><th>Gestor</th><th>Admin</th><th>Ações</th>
                                </tr></thead>
                                <tbody>${tableRows}</tbody>
                            </table>
                        </div>`
                    }
                    </div>
                </div>
            `;

            document.getElementById('btn-add-new-user-profile').addEventListener('click', () => {
                currentView = 'adminCreateUserProfile';
                renderApp();
            });
            document.getElementById('btn-back-admin-dash-users').addEventListener('click', () => { currentView = 'adminDashboard'; renderApp(); });
            document.querySelectorAll('.btn-edit-user').forEach(btn => btn.addEventListener('click', (e) => {
                const userId = e.currentTarget.dataset.id;
                const userToEdit = users.find(u => u.id === userId);
                if(userToEdit) {
                    renderAdminCreateUserProfilePage(userToEdit);
                }
            }));
            document.querySelectorAll('.btn-delete-user').forEach(btn => btn.addEventListener('click', (e) => {
                const userId = e.currentTarget.dataset.id;
                deleteUserCompletely(userId);
            }));
        }

        // --- Funções de Exportação ---
        // Exporta dados para CSV
        function exportToCSV(records) {
            if (!records || records.length === 0) {
                showNotification("Nenhum dado para exportar.", "info"); return;
            }
            const headers = ["Data Criação", "Evento", "Data Evento", "Horário", "Cat. Jogo", "QM", "Valor QM", "Chapa", "Funcionário", "Setor", "Gestor Lançador", "Observações"];
            let csvContent = headers.join(",") + "\\n";

            records.forEach(record => {
                const empChapa = globalData.employees.find(e => e.id === record.employeeId)?.registration || '-';
                const row = [
                    record.createdAt?.toDate?.().toLocaleString('pt-BR', {dateStyle:'short', timeStyle:'short'}) || 'N/A',
                    `"${(record.eventName || 'N/A').replace(/"/g, '""')}"`,
                    record.eventDate ? new Date(record.eventDate + 'T00:00:00').toLocaleDateString('pt-BR') : 'N/A',
                    record.gameTime || '-',
                    `"${(record.gameCategory || record.categoryName || 'N/A').replace(/"/g, '""')}"`,
                    record.qmClassification || '-',
                    record.qmValue ? `R$ ${record.qmValue}` : '-',
                    `"${empChapa}"`,
                    `"${(record.employeeName || 'N/A').replace(/"/g, '""')}"`,
                    `"${(record.sector || 'N/A').replace(/"/g, '""')}"`,
                    `"${(record.managerName || 'N/A').replace(/"/g, '""')}"`,
                    `"${(record.notes || '-').replace(/"/g, '""')}"`
                ];
                csvContent += row.join(",") + "\\n";
            });

            const encodedUri = encodeURI("data:text/csv;charset=utf-8," + csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "historico_registros.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showNotification("CSV exportado com sucesso!", "success");
        }

        // Exporta dados para XLSX
        function exportToXLSX(records) {
            if (typeof XLSX === 'undefined') {
                showNotification("Erro: Biblioteca de exportação XLSX não carregada.", "error");
                console.error("XLSX library (SheetJS) not found. Make more details in console");
                return;
            }
            if (!records || records.length === 0) {
                showNotification("Nenhum dado para exportar.", "info"); return;
            }

            const dataForSheet = records.map(record => {
                const empChapa = globalData.employees.find(e => e.id === record.employeeId)?.registration || '-';
                return {
                    "Data Criação": record.createdAt?.toDate?.().toLocaleString('pt-BR', {dateStyle:'short', timeStyle:'short'}) || 'N/A',
                    "Evento": record.eventName || 'N/A',
                    "Data Evento": record.eventDate ? new Date(record.eventDate + 'T00:00:00').toLocaleDateString('pt-BR') : 'N/A',
                    "Horário": record.gameTime || '-',
                    "Cat. Jogo": record.gameCategory || record.categoryName || 'N/A',
                    "QM": record.qmClassification || '-',
                    "Chapa": empChapa,
                    "Funcionário": record.employeeName || 'N/A',
                    "Setor": record.sector || 'N/A',
                    "Gestor Lançador": record.managerName || 'N/A',
                    "Observações": record.notes || '-'
                };
            });

            const worksheet = XLSX.utils.json_to_sheet(dataForSheet);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Histórico");
            XLSX.writeFile(workbook, "historico_registros.xlsx");
            showNotification("XLSX exportado com sucesso!", "success");
        }


        function downloadManageTemplate(collectionKey) {
            if (typeof XLSX === 'undefined') { showNotification("Erro: Biblioteca XLSX não carregada.", "error"); return; }
            let headers, sheetName, fileName;
            if (collectionKey === 'sectors') {
                headers = [{ "Nome": '' }];
                sheetName = 'Setores'; fileName = 'modelo_setores.xlsx';
            } else if (collectionKey === 'employees') {
                headers = [{ "Nome": '', "Matrícula": '', "Departamentos": '' }];
                sheetName = 'Funcionários'; fileName = 'modelo_funcionarios.xlsx';
            } else return;
            const ws = XLSX.utils.json_to_sheet(headers);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, sheetName);
            XLSX.writeFile(wb, fileName);
            showNotification("Modelo baixado!", "success");
        }

        function exportManageableItems(collectionKey, items) {
            if (typeof XLSX === 'undefined') { showNotification("Erro: Biblioteca XLSX não carregada.", "error"); return; }
            if (!items || items.length === 0) { showNotification("Nenhum dado para exportar.", "info"); return; }
            let dataForSheet, sheetName, fileName;
            if (collectionKey === 'sectors') {
                dataForSheet = items.map(s => ({ "Nome": s.name }));
                sheetName = 'Setores'; fileName = 'setores.xlsx';
            } else if (collectionKey === 'employees') {
                dataForSheet = items.map(e => ({
                    "Nome": e.name,
                    "Matrícula": e.registration || '',
                    "Departamentos": getEmployeeSectors(e).join(', ')
                }));
                sheetName = 'Funcionários'; fileName = 'funcionarios.xlsx';
            } else return;
            const ws = XLSX.utils.json_to_sheet(dataForSheet);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, sheetName);
            XLSX.writeFile(wb, fileName);
            showNotification(`${items.length} ${collectionKey === 'sectors' ? 'setores' : 'funcionários'} exportados!`, "success");
        }

        async function handleManageImport(file, collectionKey, existingItems) {
            if (typeof XLSX === 'undefined') { showNotification("Erro: Biblioteca XLSX não carregada.", "error"); return; }
            const statusArea = document.getElementById('import-status-area');
            const summaryText = document.getElementById('import-summary-text');
            const errorsList = document.getElementById('import-errors-list');
            if (statusArea) statusArea.classList.add('hidden');
            try {
                const data = await file.arrayBuffer();
                const wb = XLSX.read(data, { type: 'array' });
                const ws = wb.Sheets[wb.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
                if (!rows.length) { showNotification("Planilha vazia ou sem dados.", "info"); return; }
                if (collectionKey === 'sectors') {
                    await processSectorsImport(rows, existingItems, statusArea, summaryText, errorsList);
                } else if (collectionKey === 'employees') {
                    await processEmployeesImport(rows, existingItems, statusArea, summaryText, errorsList);
                }
            } catch (err) {
                showNotification("Erro ao ler arquivo: " + err.message, "error");
                console.error(err);
            }
        }

        async function processSectorsImport(rows, existingItems, statusArea, summaryText, errorsList) {
            let added = 0, skipped = 0;
            const errors = [];
            const existingNames = new Set(existingItems.map(s => s.name.toLowerCase().trim()));
            for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                const name = (row['Nome'] || row['name'] || '').toString().trim();
                if (!name) { errors.push(`Linha ${i + 2}: Nome vazio, ignorado.`); skipped++; continue; }
                if (existingNames.has(name.toLowerCase())) { skipped++; continue; }
                const { error } = await supabase.from('sectors').insert({ name, created_by: currentUser.id });
                if (error) { errors.push(`Linha ${i + 2} ("${name}"): ${error.message}`); skipped++; }
                else { added++; existingNames.add(name.toLowerCase()); }
            }
            const { data: updated } = await supabase.from('sectors').select('*').order('name');
            if (updated) globalData.sectors = updated.map(fromDB);
            if (statusArea) {
                summaryText.textContent = `Concluído: ${added} adicionados, ${skipped} ignorados/duplicados.`;
                errorsList.innerHTML = errors.map(e => `<p>${e}</p>`).join('');
                statusArea.classList.remove('hidden');
            }
            showNotification(`${added} setores importados.`, added > 0 ? "success" : "info");
            renderApp();
        }

        async function processEmployeesImport(rows, existingItems, statusArea, summaryText, errorsList) {
            let added = 0, updated = 0, skipped = 0, sectorsCreated = 0;
            const errors = [];

            // Coleta todos os departamentos únicos mencionados na planilha
            const mentionedSectors = new Set();
            rows.forEach(row => {
                const raw = (row['Departamentos'] || row['departamentos'] || row['sectors'] || row['sector'] || '').toString().trim();
                if (raw) raw.split(',').map(s => s.trim()).filter(Boolean).forEach(s => mentionedSectors.add(s));
            });

            // Cria automaticamente os setores que ainda não existem
            const existingSectorNames = new Set(globalData.sectors.map(s => s.name.toLowerCase().trim()));
            for (const sectorName of mentionedSectors) {
                if (!existingSectorNames.has(sectorName.toLowerCase().trim())) {
                    const { error } = await supabase.from('sectors').insert({ name: sectorName, created_by: currentUser.id });
                    if (!error) { existingSectorNames.add(sectorName.toLowerCase().trim()); sectorsCreated++; }
                    else errors.push(`Setor "${sectorName}" não pôde ser criado: ${error.message}`);
                }
            }
            // Recarrega setores para garantir lista atualizada
            const { data: freshSectors } = await supabase.from('sectors').select('*').order('name');
            if (freshSectors) globalData.sectors = freshSectors.map(fromDB);
            const sectorNames = new Set(globalData.sectors.map(s => s.name.toLowerCase().trim()));

            for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                const name = (row['Nome'] || row['name'] || '').toString().trim();
                const registration = (row['Matrícula'] || row['matricula'] || row['registration'] || '').toString().trim();
                const deptRaw = (row['Departamentos'] || row['departamentos'] || row['sectors'] || row['sector'] || '').toString().trim();
                if (!name) { errors.push(`Linha ${i + 2}: Nome vazio, ignorado.`); skipped++; continue; }
                const sectors = deptRaw ? deptRaw.split(',').map(s => s.trim()).filter(Boolean) : [];
                const validSectors = sectors.filter(s => sectorNames.has(s.toLowerCase()));
                let existing = null;
                if (registration) existing = existingItems.find(e => e.registration === registration);
                if (!existing) existing = existingItems.find(e => e.name.toLowerCase() === name.toLowerCase());
                const payload = { name, registration: registration || null, sectors: validSectors, sector: validSectors[0] || '' };
                if (existing) {
                    const { error } = await supabase.from('employees').update(payload).eq('id', existing.id);
                    if (error) { errors.push(`Linha ${i + 2} ("${name}"): ${error.message}`); skipped++; }
                    else updated++;
                } else {
                    const { error } = await supabase.from('employees').insert({ ...payload, created_by: currentUser.id });
                    if (error) { errors.push(`Linha ${i + 2} ("${name}"): ${error.message}`); skipped++; }
                    else added++;
                }
            }
            const { data: updatedEmps } = await supabase.from('employees').select('*').order('name');
            if (updatedEmps) globalData.employees = updatedEmps.map(fromDB);
            if (statusArea) {
                const sectorNote = sectorsCreated > 0 ? ` (${sectorsCreated} departamento(s) criados automaticamente)` : '';
                summaryText.textContent = `Concluído: ${added} adicionados, ${updated} atualizados, ${skipped} ignorados.${sectorNote}`;
                errorsList.innerHTML = errors.map(e => `<p>${e}</p>`).join('');
                statusArea.classList.remove('hidden');
            }
            showNotification(`${added + updated} funcionários processados.`, (added + updated) > 0 ? "success" : "info");
            renderApp();
        }

        // Supabase dispara onAuthStateChange automaticamente ao carregar;
        // nenhuma ação adicional necessária no DOMContentLoaded.

    </script>
